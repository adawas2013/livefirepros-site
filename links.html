  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --fire: #E8600A;
      --fire-dark: #C44D00;
      --gold: #C9A96E;
      --dark: #0D0D0D;
      --white: #FFFFFF;
    }
    html, body { min-height: 100vh; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(232,96,10,0.08), transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(201,169,110,0.06), transparent 50%),
        var(--dark);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--fire), var(--gold));
      display: grid;
      place-items: center;
      font-size: 44px;
      box-shadow: 0 8px 32px rgba(232,96,10,0.3);
    }
    .brand {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.03em;
      text-align: center;
    }
    .brand span { color: var(--fire); }
    .tagline {
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      text-align: center;
      max-width: 300px;
      line-height: 1.5;
    }
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      transition: all 0.2s ease;
      text-align: center;
    }
    .link-primary {
      background: var(--fire);
      color: var(--white);
      box-shadow: 0 6px 24px rgba(232,96,10,0.3);
    }
    .link-primary:hover {
      background: var(--fire-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(232,96,10,0.4);
    }
    .link-gold {
      background: linear-gradient(135deg, var(--gold), #a08050);
      color: var(--white);
      box-shadow: 0 6px 24px rgba(201,169,110,0.25);
    }
    .link-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(201,169,110,0.35);
    }
    .link-outline {
      background: rgba(255,255,255,0.04);
      color: var(--white);
      border: 1.5px solid rgba(255,255,255,0.15);
    }
    .link-outline:hover {
      border-color: var(--gold);
      background: rgba(201,169,110,0.08);
      transform: translateY(-2px);
    }
    .socials {
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }
    .social-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      display: grid;
      place-items: center;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .social-icon:hover {
      background: rgba(255,255,255,0.12);
      border-color: var(--gold);
      transform: translateY(-2px);
    }
    .social-icon svg { width: 20px; height: 20px; fill: var(--white); }
    .footer-text {
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      margin-top: 16px;
    }
  </style>
</head>
